<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" font-family="'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d0e12"/>
      <stop offset="0.55" stop-color="#13151b"/>
      <stop offset="1" stop-color="#0a0b0f"/>
    </linearGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFE066"/>
      <stop offset="1" stop-color="#FFC400"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#21242c"/>
      <stop offset="1" stop-color="#191b21"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.4" r="0.7">
      <stop offset="0" stop-color="#FFC400" stop-opacity="0.20"/>
      <stop offset="1" stop-color="#FFC400" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="14" stdDeviation="22" flood-color="#000000" flood-opacity="0.55"/>
    </filter>
    <filter id="amberglow" x="-60%" y="-60%" width="220%" height="220%">
      <feDropShadow dx="0" dy="0" stdDeviation="10" flood-color="#FFC400" flood-opacity="0.55"/>
    </filter>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.05"/></feComponentTransfer>
      <feComposite operator="over" in2="SourceGraphic"/>
    </filter>
  </defs>

  <!-- backdrop -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <rect width="1200" height="630" filter="url(#grain)" opacity="0.5"/>

  <!-- faint waveform motif -->
  <g stroke="#FFC400" stroke-opacity="0.10" stroke-width="2" fill="none">
    <path d="M0 560 q 20 -40 40 0 t 40 0 t 40 0 t 40 0 t 40 0 t 40 0 t 40 0 t 40 0 t 40 0 t 40 0 t 40 0 t 40 0 t 40 0 t 40 0 t 40 0 t 40 0 t 40 0 t 40 0 t 40 0 t 40 0 t 40 0 t 40 0 t 40 0 t 40 0 t 40 0 t 40 0 t 40 0 t 40 0 t 40 0"/>
  </g>

  <!-- ============ HEADER ============ -->
  <g>
    <circle cx="84" cy="74" r="7" fill="url(#amber)"/>
    <text x="102" y="80" font-size="26" font-weight="700" fill="#f4f5f7" letter-spacing="0.5">AutoCaption</text>
    <text x="285" y="80" font-size="14" font-weight="600" fill="#FFC400" letter-spacing="2">v2.0 · AFTER EFFECTS</text>
  </g>

  <!-- big claim -->
  <g>
    <text x="80" y="158" font-size="62" font-weight="800" fill="#ffffff" letter-spacing="-1.5">Captions in</text>
    <text x="80" y="226" font-size="62" font-weight="800" letter-spacing="-1.5">
      <tspan fill="url(#amber)" filter="url(#amberglow)">just 2 clicks.</tspan>
    </text>
    <text x="82" y="266" font-size="18" fill="#9aa0ab" font-weight="500">Word-accurate, auto-timed, fully styled — straight onto your timeline.</text>
  </g>

  <!-- ============ THE PANEL (left) ============ -->
  <g filter="url(#soft)">
    <rect x="80" y="312" width="470" height="268" rx="16" fill="url(#panel)" stroke="#2e323c" stroke-width="1"/>
    <!-- title bar -->
    <rect x="80" y="312" width="470" height="44" rx="16" fill="#262932"/>
    <rect x="80" y="340" width="470" height="16" fill="#262932"/>
    <circle cx="104" cy="334" r="5" fill="url(#amber)"/>
    <text x="120" y="340" font-size="14" font-weight="700" fill="#e7e9ee" letter-spacing="0.5">AutoCaption</text>
    <circle cx="516" cy="334" r="3" fill="#5b6070"/>
    <circle cx="528" cy="334" r="3" fill="#5b6070"/>

    <!-- step 1 label -->
    <text x="104" y="386" font-size="12" font-weight="700" fill="#7d8493" letter-spacing="2">STEP 1 — TRANSCRIBE</text>
    <!-- mini fields -->
    <rect x="104" y="398" width="120" height="26" rx="6" fill="#15171c" stroke="#30343e"/>
    <text x="116" y="415" font-size="12" fill="#c8ccd4">Groq ▾</text>
    <rect x="232" y="398" width="214" height="26" rx="6" fill="#15171c" stroke="#30343e"/>
    <text x="244" y="415" font-size="12" fill="#6b7180" letter-spacing="2">•••••••••• key saved</text>

    <!-- CLICK 1 button -->
    <g filter="url(#amberglow)">
      <rect x="104" y="432" width="342" height="40" rx="9" fill="#2b2f3a" stroke="#FFC400" stroke-width="2"/>
    </g>
    <text x="275" y="457" font-size="15" font-weight="700" fill="#ffffff" text-anchor="middle">Transcribe &amp; Mark Words</text>

    <!-- step 2 label -->
    <text x="104" y="506" font-size="12" font-weight="700" fill="#7d8493" letter-spacing="2">STEP 2 — GENERATE</text>
    <!-- CLICK 2 button (primary amber) -->
    <g filter="url(#amberglow)">
      <rect x="104" y="518" width="342" height="44" rx="10" fill="url(#amber)"/>
    </g>
    <text x="275" y="546" font-size="16" font-weight="800" fill="#1a1500" text-anchor="middle" letter-spacing="1">GENERATE CAPTIONS</text>
  </g>

  <!-- click badges -->
  <g>
    <circle cx="566" cy="452" r="19" fill="url(#amber)" filter="url(#amberglow)"/>
    <text x="566" y="459" font-size="20" font-weight="800" fill="#1a1500" text-anchor="middle">1</text>
    <circle cx="566" cy="540" r="19" fill="url(#amber)" filter="url(#amberglow)"/>
    <text x="566" y="547" font-size="20" font-weight="800" fill="#1a1500" text-anchor="middle">2</text>
  </g>

  <!-- ============ RESULT (right) ============ -->
  <g filter="url(#soft)">
    <rect x="648" y="312" width="472" height="268" rx="16" fill="#0b0c10" stroke="#23262e" stroke-width="1"/>
  </g>
  <!-- preview "video" -->
  <rect x="648" y="312" width="472" height="268" rx="16" fill="#101218"/>
  <rect x="648" y="312" width="472" height="268" rx="16" fill="url(#glow)"/>
  <!-- subject silhouette -->
  <g opacity="0.5">
    <circle cx="884" cy="408" r="46" fill="#2a2e38"/>
    <path d="M812 540 q 72 -96 144 0 z" fill="#2a2e38"/>
  </g>
  <!-- caption with spoken-word highlight -->
  <g text-anchor="middle" font-weight="800">
    <text x="884" y="512" font-size="34" fill="#ffffff" letter-spacing="0.5">
      <tspan>MAKE IT IN </tspan><tspan fill="url(#amber)" filter="url(#amberglow)">TWO</tspan>
    </text>
    <text x="884" y="548" font-size="34" fill="#ffffff" letter-spacing="0.5">CLICKS</text>
  </g>
  <!-- word-marker timeline -->
  <g>
    <rect x="672" y="344" width="424" height="6" rx="3" fill="#23262e"/>
    <g fill="#FFC400">
      <rect x="690" y="340" width="3" height="14" rx="1.5"/>
      <rect x="742" y="340" width="3" height="14" rx="1.5"/>
      <rect x="806" y="340" width="3" height="14" rx="1.5"/>
      <rect x="884" y="338" width="4" height="18" rx="2"/>
      <rect x="958" y="340" width="3" height="14" rx="1.5"/>
      <rect x="1030" y="340" width="3" height="14" rx="1.5"/>
    </g>
    <text x="672" y="372" font-size="11" fill="#6b7180" letter-spacing="1">ONE MARKER PER WORD — EDIT, THEN RE-GENERATE</text>
  </g>

  <!-- flow arrow between panel and result -->
  <g>
    <text x="599" y="300" font-size="12" fill="#6b7180" text-anchor="middle" letter-spacing="2">REAL-TIME</text>
    <path d="M600 360 C 612 430, 636 430, 644 446" stroke="#FFC400" stroke-opacity="0.45" stroke-width="2" fill="none" stroke-dasharray="2 6" stroke-linecap="round"/>
  </g>

  <!-- footer strip -->
  <text x="80" y="612" font-size="13" fill="#6b7180" letter-spacing="0.5">Groq / OpenAI Whisper · word timestamps · spoken-word highlight · animation presets · SRT import</text>
</svg>
